<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0WJ6264TPX"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-0WJ6264TPX');
    </script>
    <title>{{ block "title" . }}{{ .Site.Title }}{{ end }}</title>
    <link rel="icon" type="image/png" href="{{ "favicon.png" | relURL }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        // Apply dark mode theme as early as possible to prevent flicker
        const savedDarkMode = localStorage.getItem('darkMode');
        const prefersDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = savedDarkMode === 'enabled' ? 'dark' : (savedDarkMode === 'disabled' ? 'light' : (prefersDarkMode ? 'dark' : 'light'));
        document.documentElement.setAttribute('data-bs-theme', theme);
    </script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333;
        }
        
        [data-bs-theme="dark"] {
            --bg-color: #2a2a2a;
            --text-color: #f0f0f0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-color);
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }
        
        main {
            padding: 20px;
            text-align: left;
        }
        .blog-single main {
            text-align: justify;
        }
        .blog-posts {
            padding-top: 0;
            margin-top: -20px;
        }
        .blog-page header {
            margin-bottom: 5px;
        }
        .blog-page .desktop-nav {
            margin-bottom: 0;
        }
        .blog-page main {
            padding-top: 10px;
        }
        .blog-post:first-child {
            margin-top: 0;
            padding-top: 0;
        }
        
        img {
            max-width: 100%;
            height: auto;
        }
        
        .dark-mode {
            --bg-color: #2a2a2a;
            --text-color: #f0f0f0;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        /* Mobile persistent header */
        .mobile-header {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: var(--bg-color);
            z-index: 1001;
            padding: 10px 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        
        .mobile-header.show {
            display: block;
        }
        
        .mobile-header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .mobile-header-title {
            font-size: 1.2em;
            font-weight: bold;
            margin: 0;
            color: var(--text-color);
            flex-grow: 1;
            text-align: center;
        }
        
        /* Add padding to main content when mobile header is visible */
        body.mobile-header-visible main {
            padding-top: 60px;
        }
        
        @media (max-width: 768px) {
            .mobile-header {
                display: block;
            }
            
            header {
                display: flex;
                flex-direction: column;
                align-items: center;
                position: relative;
                min-height: 50px;
                margin-bottom: 0 !important;
            }
            .hamburger-container {
                position: absolute;
                left: 15px;
                top: 10px;
                z-index: 1000;
            }
            h1 {
                font-size: 1.5em;
                margin-top: 0;
                width: 100%;
                text-align: center;
                padding-top: 0;
            }
            .desktop-nav {
                display: none !important;
            }
            .blog-page main {
                padding-top: 0 !important;
            }
            .blog-post:first-child {
                margin-top: 0 !important;
                padding-top: 0 !important;
            }
        }
        .desktop-nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 5px;
        }
        .desktop-nav a {
            color: var(--text-color);
            text-decoration: none;
            font-weight: bold;
        }
        .desktop-nav a:hover {
            text-decoration: underline;
        }
        

        
        /* Bootstrap Offcanvas Customization */
        .offcanvas {
            background-color: var(--bg-color);
            color: var(--text-color);
        }
        
        .offcanvas-title {
            color: var(--text-color);
        }
        
        .offcanvas-body a {
            color: var(--text-color);
            text-decoration: none;
            font-weight: bold;
        }
        
        .offcanvas-body a:hover {
            text-decoration: underline;
        }
        
        /* Customize the hamburger button */
        .btn-outline-secondary {
            border: none;
            background: none;
            color: var(--text-color);
            padding: 0;
            font-size: 2em;
        }
        
        .btn-outline-secondary:focus {
            box-shadow: none;
        }
        
        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            header {
                margin-bottom: 20px;
            }
            
            .desktop-nav {
                display: none;
            }
        }
            
            .blog-post {
                margin-bottom: 20px;
                padding-bottom: 20px;
                border-bottom: 1px solid #eee;
                padding-top: 20px;
            }
            
            table {
                width: 100%;
                overflow-x: auto;
                display: block;
            }
            
            .toggle-container {
                top: 10px;
                right: 10px;
            }
            
            .toggle-switch {
                width: 50px;
                height: 25px;
            }
            
            .slider:before {
                height: 19px;
                width: 19px;
            }
            
            /* Increase touch target sizes */
            a {
                padding: 4px;
            }
            
            .back-to-blog a {
                padding: 10px;
                font-size: 1.1em;
            }
            
            .pagination-link {
                padding: 8px 12px;
            }
        }
        .section {
            margin-bottom: 40px;
        }
        #contact, #news {
            margin-top: 30px;
        }


        a {
            color: var(--text-color);
            text-decoration: underline;
        }
        a:hover {
            text-decoration: underline;
        }
        
        .toggle-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
        @media (max-width: 768px) {
            .toggle-container {
                display: none !important;
            }
        }
        
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 30px;
        }
        
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 30px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: #333;
        }
        
        input:checked + .slider:before {
            transform: translateX(30px);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        .experience-entry {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }
        .experience-logo {
            flex-shrink: 0;
            margin-right: 20px;
            width: 80px;
            height: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .experience-logo img {
            max-width: 100%;
            height: auto;
            display: block;
        }
        .experience-details {
            flex-grow: 1;
        }
        .experience-details p {
            margin: 5px 0;
        }
        .section-separator {
            border: 0;
            height: 2px;
            background: linear-gradient(to right, transparent, var(--text-color), transparent);
            margin: 40px 0;
            opacity: 0.3;
        }
        .entry-separator {
            border: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--text-color), transparent);
            margin: 20px 0;
            opacity: 0.2;
        }
        .news-link {
            color: inherit;
            font-weight: 500;
            text-decoration: none;
            border-bottom: 1px dotted var(--text-color);
            transition: all 0.2s ease;
        }
        .news-link:hover {
            border-bottom: 1px solid var(--text-color);
        }
        .quote {
            font-style: italic;
            color: #666;
            margin-top: 60px;
            padding: 0;
            font-family: "Times New Roman", Times, serif;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            text-align: center;
            font-size: 1.1em;
        }
        .dark-mode .quote {
            color: #aaa;
        }
        .quote-author {
            text-align: center;
            margin-top: 5px;
            font-style: normal;
            display: block;
            color: #666;
            font-family: "Times New Roman", Times, serif;
        }
        .dark-mode .quote-author {
            color: #aaa;
        }
        .blog-posts {
            margin-top: 30px;
        }
        .blog-post {
            padding: 20px 0;
            border-bottom: 1px solid #eee;
        }
        
        .blog-post:last-child {
            border-bottom: none;
        }
        
        .highlight {
            background-color: #f8f8f8;
            color: #333;
            padding: 1em;
            border-radius: 5px;
            overflow-x: auto;
        }
        
        .dark-mode .highlight {
            background-color: #2a2a2a;
            color: #f0f0f0;
        }
        
        .highlight pre {
            margin: 0;
            padding: 0;
            background-color: transparent !important;
            color: inherit !important;
        }
        
        .highlight code {
            color: inherit !important;
            background-color: transparent !important;
        }
        
        blockquote {
            color: #666;
            padding: 0 0 0 1em;
            border-left: 2px solid #4a90e2;
            font-size: 1em;
            line-height: 1.5;
            font-style: italic;
            margin: 1em 0;
        }
        
        .dark-mode blockquote {
            color: #aaa;
            border-left: 2px solid #4a90e2;
        }
        .blog-post h2 {
            margin-bottom: 5px;
            font-size: 1.5em;
        }
        .blog-post h2 a {
            color: var(--text-color);
            text-decoration: none;
        }
        .blog-post h2 a:hover {
            text-decoration: underline;
        }
        .blog-meta {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 10px;
        }
        .blog-summary {
            line-height: 1.6;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 40px;
        }
        .pagination-link {
            color: var(--text-color);
            text-decoration: none;
            padding: 5px 10px;
        }
        .pagination-link:hover {
            text-decoration: underline;
        }
        .pagination-current {
            padding: 5px 10px;
            color: #888;
        }
        .back-to-blogs-top {
            margin-bottom: 20px;
        }
        
        .back-to-blogs-top a,
        .back-to-blog a {
            color: var(--text-color);
            text-decoration: none;
            display: inline-block;
        }
        
        .back-to-blogs-top a:hover,
        .back-to-blog a:hover {
            text-decoration: underline;
        }
        
        .back-to-blog {
            margin-top: 40px;
        }
        .blog-post a {
            text-decoration: underline;
        }
        
        .blog-post img {
            max-width: 100%;
            height: auto;
        }
        .google-scholar-link {
            margin-bottom: 30px;
            font-style: italic;
            color: var(--text-color);
            opacity: 0.7;
        }
        .google-scholar-link a {
            text-decoration: underline;
            color: var(--text-color);
            font-style: normal;
        }
        .news-item {
            display: flex;
            margin-bottom: 15px;
        }
        .news-date {
            font-weight: bold;
            margin-right: 20px;
            min-width: 100px;
        }
        .news-content {
            flex-grow: 1;
        }
        .news-title {
            font-weight: bold;
            margin-bottom: 5px;
        }
        .news-title strong {
            font-weight: bold !important;
        }
        @media (max-width: 768px) {
            .news-item {
                flex-direction: column;
                margin-bottom: 12px;
                padding-bottom: 12px;
                border-bottom: 1px solid #eee;
            }
            .news-item:last-child {
                border-bottom: none;
                margin-bottom: 0;
                padding-bottom: 0;
            }
            .news-date {
                margin-right: 0;
                min-width: auto;
                margin-bottom: 2px;
                font-size: 0.9em;
            }
            .news-content {
                margin-left: 0;
            }
            .news-title {
                margin-bottom: 3px;
                font-size: 1em;
            }
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
            color: var(--text-color);
        }
        th {
            background-color: #f5f5f5;
        }
        
        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            header {
                margin-bottom: 20px;
            }
            
            .nav {
                flex-direction: column;
                gap: 10px;
            }
            
            .nav a {
                font-size: 1.1em;
                padding: 8px;
            }
            
            .blog-post {
                margin-bottom: 20px;
                padding: 15px;
            }
            
            table {
                width: 100%;
                overflow-x: auto;
                display: block;
            }
            
            .toggle-container {
                top: 10px;
                right: 10px;
            }
            
            .toggle-switch {
                width: 50px;
                height: 25px;
            }
            
            .slider:before {
                height: 19px;
                width: 19px;
            }
        }
    </style>
    {{ block "head" . }}{{ end }}
</head>
<body>
    <!-- Mobile Persistent Header -->
    <div class="mobile-header">
        <div class="mobile-header-content">
            <button class="btn btn-outline-secondary" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileMenu" aria-controls="mobileMenu">
                ☰
            </button>
            <h2 class="mobile-header-title">{{ .Site.Title }}</h2>
        </div>
    </div>
    
    <div class="toggle-container d-none d-md-block">
        <label class="toggle-switch">
            <input type="checkbox" id="darkModeToggle">
            <span class="slider"></span>
        </label>
    </div>
    
    <script>
        // Function to apply Bootstrap theme
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-bs-theme', theme);
            localStorage.setItem('darkMode', theme === 'dark' ? 'enabled' : 'disabled');
        }
        
        // Add event listener to desktop toggle
        const toggle = document.getElementById('darkModeToggle');
        if (toggle) {
            const currentTheme = document.documentElement.getAttribute('data-bs-theme');
            toggle.checked = currentTheme === 'dark';
            toggle.addEventListener('change', function() {
                applyTheme(this.checked ? 'dark' : 'light');
            });
        }
        
        // Add event listener to mobile toggle (inside offcanvas)
        document.addEventListener('DOMContentLoaded', function() {
            const toggleMobile = document.getElementById('darkModeToggleMobile');
            if (toggleMobile) {
                const currentTheme = document.documentElement.getAttribute('data-bs-theme');
                toggleMobile.checked = currentTheme === 'dark';
                toggleMobile.addEventListener('change', function() {
                    applyTheme(this.checked ? 'dark' : 'light');
                });
            }
        });
    </script>
    
    <header>
        <div class="hamburger-container d-md-none">
            <button class="btn btn-outline-secondary" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileMenu" aria-controls="mobileMenu">
                ☰
            </button>
        </div>
        <h1><a href="{{ "" | relURL }}" style="color: var(--text-color); text-decoration: none;">{{ .Site.Title }}</a></h1>
        <p>{{ .Site.Params.description }}</p>
    </header>

    <nav class="desktop-nav">
        <a href="{{ "" | relURL }}">Home</a>
        <a href="{{ "experience/" | relURL }}">Experience</a>
        <a href="{{ "publications/" | relURL }}">Publications</a>
        <a href="{{ "blog/" | relURL }}">Blog</a>
        <a href="{{ "files/CV.pdf" | relURL }}">CV</a>
    </nav>
    
    <div class="offcanvas offcanvas-start" tabindex="-1" id="mobileMenu" aria-labelledby="mobileMenuLabel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="mobileMenuLabel">Menu</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <a href="{{ "" | relURL }}" class="d-block py-2">Home</a>
            <a href="{{ "experience/" | relURL }}" class="d-block py-2">Experience</a>
            <a href="{{ "publications/" | relURL }}" class="d-block py-2">Publications</a>
            <a href="{{ "blog/" | relURL }}" class="d-block py-2">Blog</a>
            <a href="{{ "files/CV.pdf" | relURL }}" class="d-block py-2">CV</a>
            <div class="mt-3">
                <label class="toggle-switch">
                    <input type="checkbox" id="darkModeToggleMobile">
                    <span class="slider"></span>
                </label>
                <span class="ms-2">Dark Mode</span>
            </div>
        </div>
    </div>
    
    <main>
        {{ block "main" . }}{{ end }}
    </main>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Mobile persistent header script -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Show mobile header on scroll
            window.addEventListener('scroll', function() {
                if (window.scrollY > 50) {
                    document.body.classList.add('mobile-header-visible');
                } else {
                    document.body.classList.remove('mobile-header-visible');
                }
            });
            
            // Smooth scrolling for anchor links
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    const target = document.querySelector(this.getAttribute('href'));
                    if (target) {
                        target.scrollIntoView({
                            behavior: 'smooth',
                            block: 'start'
                        });
                    }
                });
            });
            

        });
    </script>
</body>
</html>
